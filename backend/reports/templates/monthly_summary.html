<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .stat-box { display: inline-block; width: 30%; margin: 10px; padding: 20px; background: #f4f4f4; border-radius: 8px; text-align: center; }
        .highlight { font-size: 24px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ brand_name }} - Brand Protection Report</h1>
        <p>Summary for {{ report_date }}</p>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <div class="stat-box">
            <div class="highlight">{{ total_detections }}</div>
            <div>Total Detections</div>
        </div>
        <div class="stat-box">
            <div class="highlight">{{ takedowns_completed }}</div>
            <div>Takedowns</div>
        </div>
        <div class="stat-box">
            <div class="highlight">{{ success_rate }}</div>
            <div>Success Rate</div>
        </div>
    </div>

    <h3>Top Threat Summary</h3>
    <p>The most active infringing domain this month was <strong>{{ top_infringing_domain }}</strong>.</p>
</body>
</html>
